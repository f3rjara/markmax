<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
  focusable="false">
  @switch (name()) {
    @case ('plus') {
      <path d="M12 5v14" />
      <path d="M5 12h14" />
    }
    @case ('file-text') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
      <path d="M14 2v4a2 2 0 0 0 2 2h4" />
      <path d="M10 9H8" />
      <path d="M16 13H8" />
      <path d="M16 17H8" />
    }
    @case ('search') {
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.3-4.3" />
    }
    @case ('code') {
      <path d="m18 16 4-4-4-4" />
      <path d="m6 8-4 4 4 4" />
      <path d="m14.5 4-5 16" />
    }
    @case ('eye') {
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
      <circle cx="12" cy="12" r="3" />
    }
    @case ('check') {
      <path d="M20 6 9 17l-5-5" />
    }
    @case ('panel-left') {
      <rect width="18" height="18" x="3" y="3" rx="2" />
      <path d="M9 3v18" />
    }
    @case ('bold') {
      <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
      <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
    }
    @case ('italic') {
      <line x1="19" y1="4" x2="10" y2="4" />
      <line x1="14" y1="20" x2="5" y2="20" />
      <line x1="15" y1="4" x2="9" y2="20" />
    }
    @case ('strikethrough') {
      <path d="M16 4H9a3 3 0 0 0-2.83 4" />
      <path d="M14 12a4 4 0 0 1 0 8H6" />
      <line x1="4" y1="12" x2="20" y2="12" />
    }
    @case ('link') {
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
    }
    @case ('list') {
      <line x1="8" y1="6" x2="21" y2="6" />
      <line x1="8" y1="12" x2="21" y2="12" />
      <line x1="8" y1="18" x2="21" y2="18" />
      <line x1="3" y1="6" x2="3.01" y2="6" />
      <line x1="3" y1="12" x2="3.01" y2="12" />
      <line x1="3" y1="18" x2="3.01" y2="18" />
    }
    @case ('list-ordered') {
      <line x1="10" y1="6" x2="21" y2="6" />
      <line x1="10" y1="12" x2="21" y2="12" />
      <line x1="10" y1="18" x2="21" y2="18" />
      <path d="M4 6h1v4" />
      <path d="M4 10h2" />
      <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" />
    }
    @case ('list-check') {
      <path d="m3 17 2 2 4-4" />
      <path d="m3 7 2 2 4-4" />
      <path d="M13 6h8" />
      <path d="M13 12h8" />
      <path d="M13 18h8" />
    }
    @case ('quote') {
      <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" />
      <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
    }
    @case ('code-inline') {
      <polyline points="16 18 22 12 16 6" />
      <polyline points="8 6 2 12 8 18" />
    }
    @case ('code-block') {
      <rect x="2" y="3" width="20" height="18" rx="2" />
      <path d="m8 10-3 3 3 3" />
      <path d="m16 10 3 3-3 3" />
      <path d="m13 7-2 10" />
    }
    @case ('minus') {
      <line x1="5" y1="12" x2="19" y2="12" />
    }
    @case ('h1') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">1</text>
    }
    @case ('h2') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">2</text>
    }
    @case ('h3') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">3</text>
    }
    @case ('h4') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">4</text>
    }
    @case ('h5') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">5</text>
    }
    @case ('h6') {
      <text x="1" y="17" font-size="13" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">H</text>
      <text x="11" y="19" font-size="9" font-weight="700" font-family="sans-serif" stroke="none" fill="currentColor">6</text>
    }
    @case ('more-vertical') {
      <circle cx="12" cy="12" r="1" />
      <circle cx="12" cy="5" r="1" />
      <circle cx="12" cy="19" r="1" />
    }
    @case ('pin') {
      <line x1="12" y1="17" x2="12" y2="22" />
      <path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.78-3.5A2 2 0 0 1 15 9.26V3.5a1.5 1.5 0 0 0-1.5-1.5h-3A1.5 1.5 0 0 0 9 3.5v5.76a2 2 0 0 1-.78 1.54l-2.78 3.5a2 2 0 0 0-.44 1.24Z" />
    }
    @case ('edit') {
      <path d="M12 20h9" />
      <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
    }
    @case ('download') {
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" y1="15" x2="12" y2="3" />
    }
    @case ('archive') {
      <rect width="20" height="5" x="2" y="3" rx="1" />
      <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8" />
      <line x1="10" y1="12" x2="14" y2="12" />
    }
    @case ('trash-2') {
      <path d="M3 6h18" />
      <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
      <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
      <line x1="10" y1="11" x2="10" y2="17" />
      <line x1="14" y1="11" x2="14" y2="17" />
    }
  }
</svg>
