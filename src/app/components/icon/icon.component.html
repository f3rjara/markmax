<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
  focusable="false">
  @switch (name()) {
    @case ('plus') {
      <path d="M12 5v14" />
      <path d="M5 12h14" />
    }
    @case ('file-text') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
      <path d="M14 2v4a2 2 0 0 0 2 2h4" />
      <path d="M10 9H8" />
      <path d="M16 13H8" />
      <path d="M16 17H8" />
    }
    @case ('search') {
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.3-4.3" />
    }
    @case ('code') {
      <path d="m18 16 4-4-4-4" />
      <path d="m6 8-4 4 4 4" />
      <path d="m14.5 4-5 16" />
    }
    @case ('eye') {
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
      <circle cx="12" cy="12" r="3" />
    }
    @case ('check') {
      <path d="M20 6 9 17l-5-5" />
    }
    @case ('panel-left') {
      <rect width="18" height="18" x="3" y="3" rx="2" />
      <path d="M9 3v18" />
    }
  }
</svg>
